services:
  - type: web
    name: ai-chat-web
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DEFAULT_DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: CORS_ORIGIN
        value: "*"
      - key: JSON_BODY_LIMIT
        value: 2mb
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 120
      - key: CHAT_MAX_MESSAGES
        value: 40
      - key: CHAT_MAX_CONTEXT_CHARS
        value: 24000
      - key: CHAT_MAX_INPUT_CHARS
        value: 8000
      - key: CHAT_REQUEST_TIMEOUT_MS
        value: 60000
      - key: TTS_TEXT_MAX_CHARS
        value: 2000
      - key: TTS_REQUEST_TIMEOUT_MS
        value: 30000
      - key: STT_AUDIO_MAX_BYTES
        value: 4194304
      - key: STT_REQUEST_TIMEOUT_MS
        value: 60000
